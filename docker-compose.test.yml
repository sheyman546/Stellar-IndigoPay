version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stellar_indigopay_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stellar_indigopay_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: indigopay-backend-test:ci
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    environment:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/stellar_indigopay_test
      REDIS_URL: redis://redis:6379
      STELLAR_NETWORK: testnet
      HORIZON_URL: https://horizon-testnet.stellar.org
      ALLOWED_ORIGINS: http://localhost:3000
      SKIP_INTEGRATION: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm test
