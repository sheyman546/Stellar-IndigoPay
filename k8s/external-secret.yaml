# k8s/external-secret.yaml
#
# ExternalSecret + SecretStore template. The SecretStore binds the
# external-secrets-operator to AWS Secrets Manager (or GCP Secret
# Manager, depending on the provider you uncomment). ExternalSecret
# resources reference a SecretStore and write a synced Kubernetes
# Secret. We then mount that Secret into the backend Pod via
# `envFrom: secretRef:` in k8s/backend.yaml.
#
# Prerequisite:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     --namespace external-secrets --create-namespace
#
# Then create an IAM service account for the cluster (IRSA on EKS,
# Workload Identity on GKE) with secretsmanager:GetSecretValue on
# the secret paths. The operator will refresh the K8s Secret every
# `refreshInterval` (default 1h).

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: stellar-indigopay
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stellar-indigopay-secrets
  namespace: stellar-indigopay
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: stellar-indigopay-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: stellar-indigopay/prod
        property: postgres_user
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: stellar-indigopay/prod
        property: postgres_password
    - secretKey: POSTGRES_DB
      remoteRef:
        key: stellar-indigopay/prod
        property: postgres_db
    - secretKey: POSTGRES_REPLICATION_USER
      remoteRef:
        key: stellar-indigopay/prod
        property: postgres_replication_user
    - secretKey: POSTGRES_REPLICATION_PASSWORD
      remoteRef:
        key: stellar-indigopay/prod
        property: postgres_replication_password
    - secretKey: DATABASE_URL
      remoteRef:
        key: stellar-indigopay/prod
        property: database_url
    - secretKey: RESEND_API_KEY
      remoteRef:
        key: stellar-indigopay/prod
        property: resend_api_key
    - secretKey: ADMIN_API_KEY
      remoteRef:
        key: stellar-indigopay/prod
        property: admin_api_key
    - secretKey: METRICS_BEARER_TOKEN
      remoteRef:
        key: stellar-indigopay/prod
        property: metrics_bearer_token
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: stellar-indigopay/prod
        property: anthropic_api_key
    - secretKey: JWT_SECRET
      remoteRef:
        key: stellar-indigopay/prod
        property: jwt_secret
    - secretKey: WEBHOOK_SIGNING_SECRET
      remoteRef:
        key: stellar-indigopay/prod
        property: webhook_signing_secret
    - secretKey: RECURRING_SIGNER_SECRET
      remoteRef:
        key: stellar-indigopay/prod
        property: recurring_signer_secret
