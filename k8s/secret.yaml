apiVersion: v1
kind: Secret
metadata:
  name: indigopay-secrets
  namespace: indigopay
type: Opaque
# THIS IS A TEMPLATE. Real values MUST come from one of:
#   1. k8s/external-secret.yaml (hydrated from AWS Secrets Manager via
#      external-secrets-operator — recommended for prod)
#   2. A gitignored k8s/secret.values.yaml + kustomize secretGenerator
#   3. The Helm chart (helm/indigopay/templates/secret.yaml), driven by
#      a gitignored values-prod.yaml.
#
# This file is checked in only so the .github/workflows/secrets-lint.yml
# gate has something to find. The lint rejects `REPLACE_ME` placeholders
# so the file fails CI until you wire one of the three options above.
stringData:
  POSTGRES_USER: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
  POSTGRES_DB: "indigopay"
  DATABASE_URL: "postgres://REPLACE_ME:REPLACE_ME@postgres-svc:5432/indigopay"
  RESEND_API_KEY: ""
  ADMIN_API_KEY: ""
  METRICS_BEARER_TOKEN: "REPLACE_ME"
