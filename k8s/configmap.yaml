apiVersion: v1
kind: ConfigMap
metadata:
  name: stellar-indigopay-config
  namespace: stellar-indigopay
data:
  # Shared
  NODE_ENV: "production"
  # Backend
  PORT: "4000"
  STELLAR_NETWORK: "testnet"
  HORIZON_URL: "https://horizon-testnet.stellar.org"
  ALLOWED_ORIGINS: "https://stellarindigopay.app,http://localhost:3000"
  APP_URL: "http://frontend-svc:3000"
  EMAIL_FROM: "Stellar-IndigoPay <updates@yourdomain.com>"
  CONTRACT_ID: ""
  # Frontend
  NEXT_PUBLIC_STELLAR_NETWORK: "testnet"
  NEXT_PUBLIC_HORIZON_URL: "https://horizon-testnet.stellar.org"
  NEXT_PUBLIC_SOROBAN_RPC_URL: "https://soroban-testnet.stellar.org"
  NEXT_PUBLIC_API_URL: "http://backend-svc:4000"
  NEXT_PUBLIC_CONTRACT_ID: ""
  NEXT_PUBLIC_USDC_ISSUER: ""
  # ── Postgres failover tracking ──────────────────────────────
  # Updated by the automated failover Job (k8s/postgres-failover-job.yaml)
  # when the standby is promoted to primary. The backend Deployment is
  # restarted after the patch so new pods pick up these values.
  # DATABASE_URL in the Secret still references postgres-svc which is
  # re-pointed by the Service selector patch.
  POSTGRES_PRIMARY_HOST: "postgres-primary-svc.stellar-indigopay.svc.cluster.local"
  POSTGRES_FAILOVER_AT: ""
