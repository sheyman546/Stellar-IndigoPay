{{- if .Values.postgres.failover.enabled }}
# helm/indigopay/templates/postgres-failover-rbac.yaml
# RBAC for automated Postgres failover — templated for Helm.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-failover-sa
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres-failover
    component: database-failover
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-healthcheck-sa
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres
    component: healthcheck
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: postgres-failover-role
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres-failover
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["backend"]
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: postgres-failover-binding
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres-failover
subjects:
  - kind: ServiceAccount
    name: postgres-failover-sa
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: postgres-failover-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: postgres-healthcheck-role
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres
    component: healthcheck
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: postgres-healthcheck-binding
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres
    component: healthcheck
subjects:
  - kind: ServiceAccount
    name: postgres-healthcheck-sa
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: postgres-healthcheck-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
