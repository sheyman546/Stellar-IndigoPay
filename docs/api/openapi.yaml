  /api/admin/login:
    post:
      tags: [Admin]
      summary: Log in as an administrator
      operationId: adminLogin
      description: >-
        Authenticate as an administrator using username and password
        credentials. Returns a 15-minute access token and sets the rotating
        refresh token as an httpOnly, SameSite=Strict cookie scoped to /api.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: Admin access token. The refresh token is set as a cookie, never returned in the body.
          headers:
            Set-Cookie:
              description: refresh_token=<opaque>; HttpOnly; SameSite=Strict; Path=/api; Max-Age=604800
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
  /api/admin/refresh:
    post:
      tags: [Admin]
      summary: Rotate the admin session
      operationId: adminRefreshToken
      description: >-
        Exchange the refresh_token cookie for a new access token. Each call
        revokes the presented refresh token and issues a replacement in the
        same family. Replaying an already-revoked token revokes every session
        in that family.
      security:
        - RefreshCookie: []
      responses:
        "200":
          description: Rotated session.
          headers:
            Set-Cookie:
              description: The replacement refresh token.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRefreshResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
  /api/admin/logout:
    post:
      tags: [Admin]
      summary: End the admin session
      operationId: adminLogout
      description: >-
        Revoke the refresh token family behind the refresh_token cookie,
        blacklist the presented access token until its natural expiry, and
        clear the cookie. Always succeeds.
      security:
        - BearerAuth: []
        - RefreshCookie: []
      responses:
        "200":
