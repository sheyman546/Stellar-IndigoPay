  /api/admin/documents/{cid}/verify:
    get:
      tags: [Admin]
      summary: Verify an IPFS document
      operationId: verifyIPFSDocument
      description: Re-fetches a pinned verification document from the configured IPFS gateway and returns its SHA-256 fingerprint.
      parameters:
        - name: cid
          in: path
          required: true
          description: IPFS content identifier.
          schema:
            type: string
        - name: name
          in: query
          required: false
          description: Optional file name to append to gateway URLs for directory-style CIDs.
          schema:
            type: string
        - name: sha256
          in: query
          required: false
          description: Optional expected SHA-256 hash to compare with the fetched document bytes.
          schema:
            type: string
            pattern: "^[a-fA-F0-9]{64}$"
      responses:
        "200":
          description: IPFS document verification result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      valid:
                        type: boolean
                      cid:
                        type: string
                      hash:
                        type: string
                      size:
                        type: integer
                      matches:
                        type: boolean
                      error:
                        type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/attestations:
    get:
      tags: [Attestations]
      operationId: getAttestations
      summary: Get attestation roll-up stats
      description: Returns platform-wide counts (total / pending / verified / revoked) plus per-source-chain breakdown (issue #125).
      security: []
      responses:
        "200":
          description: Roll-up stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/AttestationStats"
    post:
      tags: [Attestations]
      operationId: recordAttestation
      summary: Record a new cross-chain attestation
      description: Called by the relayer after source-chain finality. Requires a signed proof in either the `x-attestation-signature` / `x-attestation-timestamp` headers or the legacy `x_proof_signature` / `x_proof_timestamp` aliases.
      security: []
      parameters:
        - name: x-attestation-signature
          in: header
          required: true
          schema:
            type: string
        - name: x-attestation-timestamp
          in: header
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordAttestationRequest"
      responses:
        "201":
          description: Attestation created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  created:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Attestation"
        "200":
          description: Attestation already existed; idempotent response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  created:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Attestation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
