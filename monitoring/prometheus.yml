# monitoring/prometheus.yml
# Prometheus scrape configuration for the Stellar IndigoPay backend.
#
# Mount this file at /etc/prometheus/prometheus.yml on the Prometheus
# container. It expects the backend to be reachable at `backend-svc:4000`
# (the Kubernetes service name).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: stellar-indigopay

rule_files:
  - /etc/prometheus/alert-rules.yml
  - /etc/prometheus/alert-rules-routing.yml
  - /etc/prometheus/recording-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: stellar-indigopay-backend
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    scheme: http
    authorization:
      type: Bearer
      credentials: ${PROMETHEUS_BEARER_TOKEN}
    static_configs:
      - targets: ["backend-svc:4000"]
        labels:
          service: stellar-indigopay-api
          env: production

  # ── PostgreSQL exporter (primary) ──────────────────────────────────
  # Requires postgres_exporter sidecar or standalone deployment.
  # Install: helm install postgres-exporter prometheus-community/prometheus-postgres-exporter
  - job_name: postgres-exporter-primary
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ["postgres-exporter-primary:9187"]
        labels:
          service: postgres-primary
          env: production

  # ── PostgreSQL exporter (standby) ──────────────────────────────────
  - job_name: postgres-exporter-standby
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ["postgres-exporter-standby:9187"]
        labels:
          service: postgres-standby
          env: production

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
